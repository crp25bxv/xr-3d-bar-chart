<!DOCTYPE html>
<html>
<head>
  <title>VR 3D Bar Chart</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>
<a-scene background="color: #111">
  <a-entity position="6 10 18">
    <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

  <a-light type="ambient" intensity="0.6"></a-light>
  <a-light type="directional" position="0 10 5"></a-light>

  <a-plane rotation="-90 0 0" width="30" height="30" color="#222"></a-plane>

  <script>
    const data = [
      {x:0,y:0,value:5},{x:0,y:1,value:10},{x:0,y:2,value:15},{x:0,y:3,value:20},
      {x:1,y:0,value:8},{x:1,y:1,value:12},{x:1,y:2,value:18},{x:1,y:3,value:25},
      {x:2,y:0,value:6},{x:2,y:1,value:14},{x:2,y:2,value:22},{x:2,y:3,value:30},
      {x:3,y:0,value:9},{x:3,y:1,value:16},{x:3,y:2,value:24},{x:3,y:3,value:35}
    ];

    const scene = document.querySelector('a-scene');

    data.forEach(d => {
      const bar = document.createElement('a-box');
      const height = d.value / 2;

      bar.setAttribute('position', `${d.x * 3} ${height} ${d.y * 3}`);
      bar.setAttribute('height', height * 2);
      bar.setAttribute('width', 1.2);
      bar.setAttribute('depth', 1.2);
      bar.setAttribute('color', `rgb(${d.value * 6}, 120, 200)`);

      scene.appendChild(bar);
    });
  </script>
</a-scene>
</body>
</html>
